<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Shoruto – Get in Touch</title>
<meta name="description" content="Contact Treedell for queries, feedback, or support regarding UPSC current affairs and study resources.">
<link rel="canonical" href="https://www.shoruto.com/contactus">
<link rel="icon" href="/icon-192.png" type="image/png">
<link rel="apple-touch-icon" href="/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins;
}

/* BODY */
body{
background:#f1f5f9;
color:#0f172a;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:20px;
}

/* BOX */

.contact-box{
background:#ffffff;
padding:30px;
border-radius:14px;
max-width:700px;
width:100%;
border:1px solid #e2e8f0;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

/* TEXT */

h1{
margin-bottom:10px;
}

p{
font-size:14px;
color:#475569;
margin-bottom:20px;
}

label{
font-size:14px;
display:block;
margin-bottom:6px;
color:#334155;
}

/* INPUTS */

input, textarea{
width:100%;
padding:10px;
border-radius:8px;
margin-bottom:14px;

border:1px solid #e2e8f0;
background:#f8fafc;
color:#0f172a;
}

input:focus, textarea:focus{
outline:none;
border-color:#f97316;
background:#ffffff;
}

/* TEXTAREA */

textarea{
resize:none;
height:120px;
}

/* BUTTON */

button{
background:#f97316;
border:none;
padding:10px 18px;
border-radius:8px;
color:white;
font-weight:600;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

/* EMAIL */

.email{
margin-top:15px;
font-size:14px;
color:#475569;
}

.email a{
color:#f97316;
text-decoration:none;
font-weight:600;
}

/* BACK BUTTON */

.back{
display:inline-block;
margin-top:20px;
background:#f97316;
padding:10px 16px;
border-radius:8px;
color:white;
text-decoration:none;
font-weight:600;
}

</style>
</head>

<body>

<div class="contact-box">

<h1>Contact Us</h1>

<p>
If you have any questions, suggestions, or feedback regarding our website or daily current affairs content, feel free to contact us.
</p>

<form action="mailto:support@myaffiliatepage.com" method="post" enctype="text/plain">

<label>Name</label>
<input type="text" name="name" required>

<label>Email</label>
<input type="email" name="email" required>

<label>Message</label>
<textarea name="message" required></textarea>

<button type="submit">Send Message</button>

</form>

<div class="email">
Or email us directly at  
<a href="mailto:treedellteam@gmail.com">treedellteam@gmail.com</a>
</div>

<a href="/" class="back">Back to Home</a>

</div>

</body>
</html>
