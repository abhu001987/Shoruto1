<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shoruto – Daily Quiz & Mock Practice for UPSC</title>

<meta name="description" content="Attempt daily quizzes and mock tests for UPSC preparation on Shoruto. Improve accuracy, track performance, and learn smarter every day.">

<link rel="canonical" href="https://www.shoruto.com/DailyQuiz">

<link rel="icon" href="/icon-192.png" type="image/png">
<link rel="apple-touch-icon" href="/icon-192.png">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  

<style>

/* RESET */
*{box-sizing:border-box;}

:root{
--bg1:#0f2027;
--bg2:#203a43;
--bg3:#2c5364;
--card:rgba(255,255,255,0.06);
--text:#eaf4f4;
--sub:#9fb7b9;
--green:#22c55e;
--orange:#ff7a00;
--border:rgba(255,255,255,0.08);
}

body{
margin:0;
font-family:Arial;
background:linear-gradient(120deg,var(--bg1),var(--bg2),var(--bg3));
color:var(--text);
}

/* APP */
.main{
max-width:480px;
margin:auto;
padding:14px;
padding-bottom:80px;
}

/* HEADER (LIKE MOCK) */
.header{
display:flex;
justify-content:space-between;
align-items:center;
background:var(--card);
border:1px solid var(--border);
padding:14px;
border-radius:16px;
backdrop-filter:blur(10px);
}

.back{
font-weight:600;
}

.timer{
color:var(--orange);
font-weight:600;
}

/* PROGRESS */
.progress{
height:6px;
margin:12px 0;
background:#0b1f22;
border-radius:10px;
overflow:hidden;
}

.bar{
height:100%;
background:var(--green);
}

/* CARD */
.card{
background:var(--card);
padding:16px;
border-radius:16px;
border:1px solid var(--border);
backdrop-filter:blur(10px);
}

/* QUESTION */
.question{
font-size:18px;
font-weight:600;
}
/* OPTION */
.option{
display:flex;
justify-content:space-between;
align-items:center;
padding:14px;
margin-top:10px;
border-radius:14px;
background:#1a3e44;
cursor:pointer;
}

.left{
display:flex;
gap:10px;
align-items:center;
}

.badge{
background:#2a5258;
padding:8px 12px;
border-radius:50%;
}

.circle{
width:18px;
height:18px;
border-radius:50%;
border:2px solid #aaa;
}

.option.selected{
border:2px solid var(--green);
background:rgba(34,197,94,0.15);
}

.option.selected .circle{
background:var(--green);
border:none;
}

/* TIP (LIKE MOCK) */
.tip{
margin-top:14px;
background:rgba(34,197,94,0.1);
padding:12px;
border-radius:12px;
color:var(--green);
font-size:13px;
}

/* BUTTONS */
.buttons{
display:flex;
gap:10px;
margin-top:14px;
}

.btn{
flex:1;
padding:14px;
border:none;
border-radius:14px;
font-weight:600;
}

.prev{
background:rgba(255,255,255,0.05);
color:white;
}

.next{
background:linear-gradient(135deg,#ff7a00,#ff9a3c);
color:white;
}
/* ===== RESULT (UNCHANGED) ===== */

.result-header{
background:rgba(255,255,255,0.06);
padding:12px;
border-radius:14px;
text-align:center;
margin-bottom:10px;
}

.circle-wrap{
position:relative;
width:170px;
height:170px;
margin:15px auto;
}

.circle-progress{
stroke:url(#grad);
stroke-width:12;
fill:none;
stroke-linecap:round;
stroke-dasharray:440;
stroke-dashoffset:440;
transition:1.2s ease;
}

.score-text{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:28px;
}

.status{text-align:center;font-weight:700;margin-top:10px;}
.subtext{text-align:center;color:var(--sub);font-size:13px;}

.grid{display:flex;gap:10px;margin-top:15px;}
.box{
flex:1;
padding:14px;
border-radius:14px;
background:rgba(255,255,255,0.06);
text-align:center;
}

.q-card{
background:rgba(255,255,255,0.05);
padding:14px;
margin-top:12px;
border-radius:14px;
}

.inner{
margin-top:8px;
padding:10px;
background:rgba(0,0,0,0.25);
border-radius:10px;
}

.correct{color:#22c55e;}
.wrong{color:#ff4d4d;}

.result-buttons{
display:flex;
gap:10px;
margin-top:15px;
}

.result-buttons button{
flex:1;
padding:12px;
border-radius:12px;
border:none;
}

.retry{background:#203a43;color:white;}
.home{background:linear-gradient(135deg,#ff7a00,#ff9a3c);color:white;}

</style>
</head>

<body>

<div class="main" id="app"></div>

<script>

const quiz=[
{
q:"The Food Price Index is released by which organization?",
options:["World Bank","IMF","World Economic Forum","FAO"],
answer:3,
tip:"Focus on international organizations related to food and agriculture.",
exp:"FAO releases the Food Price Index."
}
];

let current=0,answers=[],timer,time=60;

function load(){

clearInterval(timer);
time=60;
startTimer();

let q=quiz[current];

let html=`
<div class="header">
<div class="back" onclick="window.location.href='https://shoruto.com'">Back</div>
<div class="timer">⏱ ${time}s | ${current+1}/${quiz.length}</div>
</div>

<div class="progress">
<div class="bar" style="width:${((current+1)/quiz.length)*100}%"></div>
</div>

<div class="card">
<div class="question">${q.q}</div>
`;

q.options.forEach((opt,i)=>{
html+=`
<div class="option ${answers[current]==i?'selected':''}" onclick="select(${i})">
<div class="left">
<div class="badge">${String.fromCharCode(65+i)}</div>
<div>${opt}</div>
</div>
<div class="circle"></div>
</div>`;
});

html+=`
<div class="tip">✨ ${q.tip}</div>

<div class="buttons">
<button class="btn prev" onclick="prev()">Previous</button>
<button class="btn next" onclick="next()">Next</button>
</div>
</div>
`;

app.innerHTML=html;
}

function startTimer(){
timer=setInterval(()=>{
time--;
if(time<=0) next();
},1000);
}

function select(i){
answers[current]=i;
load();
}
function next(){
clearInterval(timer);
if(current<quiz.length-1){current++;load();}
else showResult();
}

function prev(){
clearInterval(timer);
if(current>0){current--;load();}
}

/* RESULT SAME AS YOURS (kept untouched) */

function showResult(){
let attempted=answers.filter(a=>a!==undefined).length;
let skipped=quiz.length-attempted;

let score=0;
quiz.forEach((q,i)=>{
if(q.answer===answers[i]) score++;
});
let percent=Math.round((score/quiz.length)*100);

let html=`<div class="result">

<div class="result-header">📊 Result Dashboard</div>

<div class="circle-wrap">
<svg width="170" height="170">
<defs>
<linearGradient id="grad">
<stop offset="0%" stop-color="#ff7a00"/>
<stop offset="100%" stop-color="#ff3c3c"/>
</linearGradient>
</defs>
<circle cx="85" cy="85" r="70" stroke="rgba(255,255,255,0.1)" stroke-width="12" fill="none"/>
<circle id="progressCircle" cx="85" cy="85" r="70" class="circle-progress"/>
</svg>
<div class="score-text">${percent}%</div>
</div>

<div class="status">Score: ${score}/${quiz.length}</div>
<div class="subtext">Keep improving 🚀</div>

<div class="grid">
<div class="box">⭐<br>${score}<br>Points</div>
<div class="box">🎯<br>${percent}%<br>Accuracy</div>
</div>

<div class="grid">
<div class="box">📄<br>${attempted}<br>Attempted</div>
<div class="box">⏭<br>${skipped}<br>Skipped</div>
</div>

<h3>Analysis</h3>
`;

quiz.forEach((q,i)=>{
html+=`
<div class="q-card">
<b>Q${i+1}:</b> ${q.q}

<div class="inner wrong">
<b>Your:</b><br>${answers[i]!=undefined?q.options[answers[i]]:"Not Attempted"}
</div>

<div class="inner correct">
<b>Correct:</b><br>${q.options[q.answer]}
</div>
</div>`;
});

html+=`
<div class="result-buttons">
<button class="retry" onclick="location.reload()">Retry</button>
<button class="home" onclick="window.location.href='https://shoruto.com'">Home</button>
</div>

</div>`;

app.innerHTML=html;

setTimeout(()=>{
let circle=document.getElementById("progressCircle");
let offset=440-(440*percent/100);
circle.style.strokeDashoffset=offset;
},100);
}

load();

</script>

</body>
</html>
