<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{
  --bg: #f1f5f9;
  --card: #ffffff;
  --soft: #f8fafc;
  --border: #e2e8f0;

  --text: #0f172a;
  --sub: #64748b;

  --green: #22c55e;
  --orange: #f97316;
}

/* BODY */
body{
  margin:0;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  font-family:Poppins,sans-serif;
  background: var(--bg);
  color: var(--text);
}

.main{
  flex:1;
  padding-bottom:70px;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  padding:16px;
  align-items:center;
}

.back{
  background: var(--card);
  padding:12px;
  border-radius:14px;
  cursor:pointer;
  border:1px solid var(--border);
}

.timer{
  border:1px solid var(--border);
  padding:8px 14px;
  border-radius:14px;
  color: var(--green);
  background: var(--card);
}

/* PROGRESS */
.progress{
  height:6px;
  margin:10px 16px;
  background: var(--border);
  border-radius:10px;
  overflow:hidden;
}

.bar{
  height:100%;
  background: var(--green);
}

/* CARD */
.card{
  margin:10px 16px;
  padding:18px;
  border-radius:20px;
  background: var(--card);
  border:1px solid var(--border);
}

/* CURRENT */
.current{
  display:flex;
  gap:12px;
  align-items:center;
  margin-bottom:10px;
}

.icon{
  background: rgba(34,197,94,0.15);
  padding:12px;
  border-radius:12px;
}

/* QUESTION */
.question{
  font-size:20px;
  margin:15px 0;
}

/* OPTION */
.option{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px;
  margin-bottom:10px;
  border-radius:14px;
  background: var(--soft);
  cursor:pointer;
  border:1px solid var(--border);
}

.left{
  display:flex;
  gap:12px;
  align-items:center;
}

.badge{
  background: #e2e8f0;
  padding:8px 12px;
  border-radius:50%;
}

.circle{
  width:18px;
  height:18px;
  border-radius:50%;
  border:2px solid #94a3b8;
}

.option.selected{
  border:2px solid var(--green);
  background: rgba(34,197,94,0.1);
}

.option.selected .circle{
  background: var(--green);
  border:none;
}

/* TIP */
.tip{
  margin-top:10px;
  font-size:14px;
  color: var(--sub);
}

/* BUTTONS */
.buttons{
  display:flex;
  justify-content:space-between;
  margin-top:12px;
}

.btn{
  padding:12px 20px;
  border-radius:12px;
  border:none;
}

.prev{
  background: var(--card);
  border:1px solid var(--border);
  color: var(--text);
}

.next{
  background: linear-gradient(135deg,#f97316,#fb923c);
  color:white;
}

/* FOOTER */
.footer{
  position:fixed;
  bottom:0;
  width:100%;
  background: var(--card);
  padding:12px;
  text-align:center;
  border-top:1px solid var(--border);
  font-size:13px;
  color: var(--sub);
}

/* RESULT */
.result{
  padding:16px;
}

.circle-result{
  width:140px;
  height:140px;
  border-radius:50%;
  margin:20px auto;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  background: conic-gradient(var(--green) 75%, var(--border) 0);
}

.circle-result::after{
  content:"";
  position:absolute;
  width:100px;
  height:100px;
  background: var(--bg);
  border-radius:50%;
}

.score{
  position:relative;
  z-index:2;
  font-size:22px;
}

.result-card{
  background: var(--card);
  padding:14px;
  margin-bottom:12px;
  border-radius:14px;
  border:1px solid var(--border);
}

.correct{color: var(--green);}
.wrong{color: #ef4444;}

.exp{
  margin-top:8px;
  font-size:14px;
  color: var(--sub);
}
</style>
</head>

<body>

<div class="main" id="app">

<div class="header">
<div class="back" onclick="window.location.href='https://shoruto.com'">←</div>
<div class="timer">⏱ <span id="time">60</span>s | <span id="count"></span></div>
</div>

<div class="progress"><div class="bar" id="bar"></div></div>

<div class="card" id="quizBox"></div>

</div>

<div class="footer">Shoruto - Your shortcut to daily learning</div>

<script>
const quiz=[
{
q:"The Food Price Index is released by which organization?",
options:["World Bank","IMF","World Economic Forum","FAO"],
answer:3,
tip:"Focus on international organizations related to food and agriculture.",
exp:"FAO releases the Food Price Index."
},
{
q:"Which of the following is a direct tax in India?",
options:["GST","Customs Duty","Income Tax","Excise Duty"],
answer:2,
tip:"Direct tax is paid directly by individuals.",
exp:"Income tax is a direct tax."
}
];

let current=0,answers=[],timer,time=60;

function load(){
clearInterval(timer);
time=60;
startTimer();

let q=quiz[current];

count.innerText=(current+1)+" / "+quiz.length;
bar.style.width=((current+1)/quiz.length)*100+"%";

let html=`
<div class="current">
<div class="icon">📄</div>
<div>
<div style="color:#22c55e">Current Question</div>
<div>${current+1} / ${quiz.length}</div>
</div>
</div>

<div class="question">${q.q}</div>
`;

q.options.forEach((opt,i)=>{
html+=`
<div class="option ${answers[current]==i?'selected':''}" onclick="select(${i})">
<div class="left">
<div class="badge">${String.fromCharCode(65+i)}</div>
<div>${opt}</div>
</div>
<div class="circle"></div>
</div>`;
});

html+=`
<div class="tip">💡 ${q.tip}</div>

<div class="buttons">
<button class="btn prev" onclick="prev()">Previous</button>
<button class="btn next" onclick="next()">Next</button>
</div>
`;

quizBox.innerHTML=html;
}
/* TIMER */
function startTimer(){
timer=setInterval(()=>{
time--;
document.getElementById("time").innerText=time;
if(time<=0) next();
},1000);
}

/* SELECT */
function select(i){
answers[current]=i;
load();
}

/* NAV */
function next(){
clearInterval(timer);
if(current<quiz.length-1){
current++;
load();
}else{
showResult();
}
}
function prev(){
clearInterval(timer);
if(current>0){
current--;
load();
}
}

/* RESULT */
function showResult(){
let score=0;
let html="<div class='result'><h2>🎯 Result</h2>";

quiz.forEach((q,i)=>{
if(q.answer===answers[i]) score++;

html+=`
<div class="result-card">
<b>Q${i+1}:</b> ${q.q}<br>
Your: <span class="${q.answer===answers[i]?'correct':'wrong'}">
${answers[i]!=undefined?q.options[answers[i]]:"Not Attempted"}
</span><br>
Correct: <span class="correct">${q.options[q.answer]}</span>
<div class="exp">📖 ${q.exp}</div>
</div>`;
});

let percent=(score/quiz.length)*360;

html+=`
<div class="circle-result" id="circle">
<div class="score">${score}/${quiz.length}</div>
</div>
</div>`;

app.innerHTML=html;

document.getElementById("circle").style.background =
`conic-gradient(#22c55e ${percent}deg, #1a3e44 ${percent}deg)`;
}

load();
</script>

</body>
</html>
