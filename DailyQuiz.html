<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shoruto – Daily Quiz & Mock Practice for UPSC</title>

<meta name="description" content="Attempt daily quizzes and mock tests for UPSC preparation on Shoruto. Improve accuracy, track performance, and learn smarter every day.">

<link rel="canonical" href="https://www.shoruto.com/DailyQuiz">

<link rel="icon" href="/icon-192.png" type="image/png">
<link rel="apple-touch-icon" href="/icon-192.png">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  

<style>

*{box-sizing:border-box;}

:root{
--bg1:#0f2a2e;
--bg2:#123c42;
--card:#16393e;
--text:#eaf4f4;
--sub:#9fb7b9;
--green:#22c55e;
--orange:#ff7a00;
--border:rgba(255,255,255,0.08);
}

body{
margin:0;
min-height:100vh;
display:flex;
flex-direction:column;
font-family:Poppins,sans-serif;
background:linear-gradient(135deg,var(--bg1),var(--bg2));
color:var(--text);
}

.main{
flex:1;
padding:16px;
padding-bottom:90px; /* space for footer */
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
padding:16px;
align-items:center;
}

.back{
background:#0b1f22;
padding:12px;
border-radius:14px;
cursor:pointer;
}

.timer{
border:1px solid var(--border);
padding:8px 14px;
border-radius:14px;
color:var(--green);
}

/* PROGRESS */
.progress{
height:6px;
margin:10px 16px;
background:#0b1f22;
border-radius:10px;
overflow:hidden;
}

.bar{
height:100%;
background:var(--green);
}

/* CARD */
.card{
margin:10px 16px;
padding:18px;
border-radius:20px;
background:rgba(22,57,62,0.9);
border:1px solid var(--border);
}

/* QUESTION */
.question{
font-size:20px;
margin:15px 0;
}

/* OPTIONS */
.option{
display:flex;
justify-content:space-between;
align-items:center;
padding:14px;
margin-bottom:10px;
border-radius:14px;
background:#1a3e44;
cursor:pointer;
}

.left{
display:flex;
gap:12px;
align-items:center;
}

.badge{
background:#2a5258;
padding:8px 12px;
border-radius:50%;
}

.circle{
width:18px;
height:18px;
border-radius:50%;
border:2px solid #aaa;
}

.option.selected{
border:2px solid var(--green);
background:rgba(34,197,94,0.15);
}

.option.selected .circle{
background:var(--green);
border:none;
}

/* TIP */
.tip{
margin-top:10px;
font-size:14px;
color:var(--sub);
}

/* BUTTONS */
.buttons{
display:flex;
justify-content:space-between;
margin-top:12px;
}

.btn{
padding:12px 20px;
border-radius:12px;
border:none;
}

.prev{
background:transparent;
border:1px solid var(--border);
color:white;
}

.next{
background:linear-gradient(135deg,#ff7a00,#ff9a3c);
color:white;
}

/* 🔥 BOTTOM NAV */
.bottom-nav{
position:fixed;
bottom:0;
left:0;
width:100%;
display:flex;
justify-content:space-around;
background:#0b1f22;
padding:10px 0;
border-top:1px solid rgba(255,255,255,0.08);
z-index:100;
}

.bottom-nav div{
text-align:center;
font-size:14px;
color:#9fb7b9;
}

.bottom-nav span{
font-size:12px;
}

/* highlight active */
.bottom-nav div:first-child{
color:#22c55e;
}

</style>
</head>

<body>

<div class="main" id="app"></div>

<!-- 🔥 FOOTER -->
<div class="bottom-nav">
  <div>🧠<br><span>Assess</span></div>
  <div>✍️<br><span>Express</span></div>
  <div>🛡️<br><span>Evaluation</span></div>
</div>

<script>

const quiz=[
{
q:"The Food Price Index is released by which organization?",
options:["World Bank","IMF","World Economic Forum","FAO"],
answer:3,
tip:"Focus on international organizations related to food and agriculture."
},
{
q:"Which is a direct tax?",
options:["GST","Customs Duty","Income Tax","Excise"],
answer:2,
tip:"Direct tax is paid directly by individuals."
}
];
let current=0,answers=[],timer,time=60;

function load(){
clearInterval(timer);
time=60;
startTimer();

let q=quiz[current];

let html=`
<div class="header">
<div class="back" onclick="location.reload()">Back</div>
<div class="timer">⏱ ${time}s | ${current+1}/${quiz.length}</div>
</div>

<div class="progress">
<div class="bar" style="width:${((current+1)/quiz.length)*100}%"></div>
</div>

<div class="card">
<div class="question">${q.q}</div>
`;

q.options.forEach((opt,i)=>{
html+=`
<div class="option ${answers[current]==i?'selected':''}" onclick="select(${i})">
<div class="left">
<div class="badge">${String.fromCharCode(65+i)}</div>
<div>${opt}</div>
</div>
<div class="circle"></div>
</div>`;
});

html+=`
<div class="tip">💡 ${q.tip}</div>

<div class="buttons">
<button class="btn prev" onclick="prev()">Previous</button>
<button class="btn next" onclick="next()">Next</button>
</div>
</div>
`;

app.innerHTML=html;
}

/* TIMER */
function startTimer(){
timer=setInterval(()=>{
time--;
if(time<=0) next();
},1000);
}

/* SELECT */
function select(i){
answers[current]=i;
load();
}

/* NAV */
function next(){
clearInterval(timer);
if(current<quiz.length-1){
current++;
load();
}else{
alert("Quiz Completed"); /* your result stays same */
}
}

function prev(){
clearInterval(timer);
if(current>0){
current--;
load();
}
}

load();

</script>

</body>
</html>
