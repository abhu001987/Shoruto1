<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz</title>

<style>
:root {
  --bg1:#0f2a2e;
  --bg2:#123c42;
  --card:#16393e;
  --text:#eaf4f4;
  --sub:#9fb7b9;
  --green:#22c55e;
  --orange:#ff7a00;
  --border:rgba(255,255,255,0.08);
}

body {
  margin:0;
  font-family:Poppins, sans-serif;
  background:linear-gradient(135deg,var(--bg1),var(--bg2));
  color:var(--text);
}

/* HEADER */
.header {
  display:flex;
  justify-content:space-between;
  padding:16px;
}

.back {
  background:#0b1f22;
  padding:12px;
  border-radius:14px;
}

.timer-box {
  border:1px solid var(--border);
  padding:8px 14px;
  border-radius:14px;
  display:flex;
  gap:10px;
  align-items:center;
  color: var(--green);
}

/* PROGRESS */
.progress {
  height:6px;
  margin:10px 16px;
  background:#0b1f22;
  border-radius:10px;
  overflow:hidden;
}
.bar {
  height:100%;
  width:0%;
  background:var(--green);
  transition:0.3s;
}

/* CARD */
.card {
  margin:16px;
  padding:18px;
  border-radius:20px;
  background:rgba(22,57,62,0.9);
  border:1px solid var(--border);
  animation:fade 0.4s;
}

/* CURRENT */
.current {
  display:flex;
  gap:12px;
  align-items:center;
  margin-bottom:10px;
}
.current-icon {
  background:rgba(34,197,94,0.2);
  padding:10px;
  border-radius:12px;
}

/* QUESTION */
.question {
  font-size:20px;
  margin:15px 0;
}

/* OPTIONS */
.option {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px;
  margin-bottom:12px;
  border-radius:14px;
  background:#1a3e44;
  cursor:pointer;
  transition:0.2s;
}
.option:hover {
  background:#214b52;
}

.left {
  display:flex;
  gap:12px;
  align-items:center;
}

.badge {
  background:#2a5258;
  padding:8px 12px;
  border-radius:50%;
}

.circle {
  width:18px;
  height:18px;
  border-radius:50%;
  border:2px solid #aaa;
}

.option.selected {
  border:2px solid var(--green);
  background:rgba(34,197,94,0.15);
}
.option.selected .circle {
  background:var(--green);
  border:none;
}

/* TIP */
.tip {
  margin:14px 0;
  color:var(--sub);
  font-size:14px;
}

/* BUTTONS */
.buttons {
  display:flex;
  justify-content:space-between;
  margin-top:10px;
}

.btn {
  padding:14px 20px;
  border-radius:12px;
  border:none;
  font-size:15px;
  cursor:pointer;
}

.prev {
  background:transparent;
  border:1px solid var(--border);
  color:var(--text);
}

.next {
  background:linear-gradient(135deg,#ff7a00,#ff9a3c);
  color:#fff;
}

/* RESULT */
.result {
  padding:20px;
}

.result-card {
  background:var(--card);
  padding:16px;
  margin-bottom:12px;
  border-radius:14px;
  animation:fadeUp 0.4s;
}

.correct { color:#22c55e; }
.wrong { color:#ff4d4d; }

@keyframes fade {
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1;}
}
@keyframes fadeUp {
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1;}
}
</style>
</head>

<body>

<div id="app">

<div class="header">
  <div class="back">←</div>
  <div class="timer-box">⏱ <span id="time">60</span>s | <span id="count"></span></div>
</div>

<div class="progress"><div class="bar" id="bar"></div></div>

<div class="card" id="quizBox"></div>

</div>

<script>
const quiz = [
{
q:"The Food Price Index is released by which organization?",
options:[
"World Bank",
"International Monetary Fund",
"World Economic Forum",
"Food and Agriculture Organization"
],
answer:3
},
{
q:"What is the Jal Jeevan Mission?",
options:[
"Rural housing scheme",
"Drinking water supply to rural households",
"Education reform",
"Agriculture subsidy"
],
answer:1
},
{
q:"What is the Jal Jeevan Mission?",
options:[
"Rural housing scheme",
"Drinking water supply to rural households",
"Education reform",
"Agriculture subsidy"
],
answer:1
},
{
q:"What is the Jal Jeevan Mission?",
options:[
"Rural housing scheme",
"Drinking water supply to rural households",
"Education reform",
"Agriculture subsidy"
],
answer:1
}
];

let current=0;
let answers=[];
let timer;
let timeLeft = 60;

/* LOAD QUESTION */
function load(){
  clearInterval(timer);
  timeLeft = 60;
  startTimer();

  const q=quiz[current];

  document.getElementById("count").innerText = (current+1)+" / "+quiz.length;
  document.getElementById("bar").style.width = ((current+1)/quiz.length)*100+"%";

  let html=`
    <div class="current">
      <div class="current-icon">📄</div>
      <div>
        <div style="color:#22c55e">Current Question</div>
        <div>${current+1} / ${quiz.length}</div>
      </div>
    </div>

    <div class="question">${q.q}</div>
  `;

  q.options.forEach((opt,i)=>{
    html+=`
    <div class="option ${answers[current]==i?'selected':''}" onclick="select(${i})">
      <div class="left">
        <div class="badge">${String.fromCharCode(65+i)}</div>
        <div>${opt}</div>
      </div>
      <div class="circle"></div>
    </div>`;
  });

  html+=`
    <div class="tip">💡 Read carefully before selecting</div>

    <div class="buttons">
      <button class="btn prev" onclick="prev()">Previous</button>
      <button class="btn next" onclick="next()">Next</button>
    </div>
  `;

  document.getElementById("quizBox").innerHTML = html;
}
/* TIMER */
function startTimer(){
  document.getElementById("time").innerText = timeLeft;

  timer = setInterval(()=>{
    timeLeft--;
    document.getElementById("time").innerText = timeLeft;

    if(timeLeft <= 0){
      clearInterval(timer);
      next(); // auto move
    }
  },1000);
}

/* SELECT */
function select(i){
  answers[current]=i;
  load();
}

/* NAV */
function next(){
  clearInterval(timer);

  if(current < quiz.length - 1){
    current++;
    load();
  } else {
    showResult();
  }
}

function prev(){
  clearInterval(timer);

  if(current > 0){
    current--;
    load();
  }
}

/* RESULT */
function showResult(){
  let score=0;
  let html=`<div class="result"><h2>🎯 Result</h2>`;

  quiz.forEach((q,i)=>{
    let correct = q.answer === answers[i];
    if(correct) score++;

    html+=`
    <div class="result-card">
      <div><b>Q${i+1}:</b> ${q.q}</div>
      <div>Your Answer: <span class="${correct?'correct':'wrong'}">
      ${answers[i]!==undefined ? q.options[answers[i]] : "Not Attempted"}
      </span></div>
      <div>Correct: <span class="correct">${q.options[q.answer]}</span></div>
    </div>`;
  });

  html+=`<h2>Score: ${score}/${quiz.length}</h2></div>`;

  document.getElementById("app").innerHTML = html;
}

/* INIT */
load();
</script>

</body>
</html>
