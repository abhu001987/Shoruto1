<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{
--bg1:#0f2a2e;
--bg2:#123c42;
--card:#16393e;
--text:#eaf4f4;
--sub:#9fb7b9;
--green:#22c55e;
--orange:#ff7a00;
--border:rgba(255,255,255,0.08);
}

body{
margin:0;
font-family:Poppins,sans-serif;
background:linear-gradient(135deg,var(--bg1),var(--bg2));
color:var(--text);
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
padding:16px;
align-items:center;
}
.back{
background:#0b1f22;
padding:12px;
border-radius:14px;
cursor:pointer;
}
.timer{
border:1px solid var(--border);
padding:8px 14px;
border-radius:14px;
color:var(--green);
}

/* PROGRESS */
.progress{
height:6px;
margin:10px 16px;
background:#0b1f22;
border-radius:10px;
overflow:hidden;
}
.bar{
height:100%;
background:var(--green);
}

/* CARD */
.card{
margin:16px;
padding:18px;
border-radius:20px;
background:rgba(22,57,62,0.9);
border:1px solid var(--border);
}

/* CURRENT */
.current{
display:flex;
gap:12px;
align-items:center;
margin-bottom:10px;
}
.icon{
background:rgba(34,197,94,0.2);
padding:10px;
border-radius:12px;
}

/* QUESTION */
.question{
font-size:20px;
margin:15px 0;
}

/* OPTION */
.option{
padding:14px;
margin-bottom:10px;
border-radius:14px;
background:#1a3e44;
cursor:pointer;
}
.option.selected{
border:2px solid var(--green);
background:rgba(34,197,94,0.15);
}

/* TIP */
.tip{
margin-top:12px;
font-size:14px;
color:var(--sub);
}

/* BUTTONS */
.buttons{
display:flex;
justify-content:space-between;
margin-top:15px;
}
.btn{
padding:12px 20px;
border-radius:12px;
border:none;
}
.prev{
background:transparent;
border:1px solid var(--border);
color:white;
}
.next{
background:linear-gradient(135deg,#ff7a00,#ff9a3c);
color:white;
}

/* BOTTOM BAR */
.bottom{
position:fixed;
bottom:0;
width:100%;
background:#0b1f22;
padding:12px;
text-align:center;
border-top:1px solid var(--border);
}

/* RESULT */
.result-card{
background:var(--card);
padding:14px;
margin:10px;
border-radius:14px;
}
.correct{color:#22c55e;}
.wrong{color:#ff4d4d;}

.circle{
width:140px;
height:140px;
border-radius:50%;
border:10px solid #1a3e44;
margin:20px auto;
position:relative;
}
.fill{
position:absolute;
width:100%;
height:100%;
border-radius:50%;
border:10px solid var(--green);
clip:rect(0,140px,140px,70px);
transform:rotate(0deg);
transition:1s;
}
.score{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
}
</style>
</head>

<body>

<div id="app">

<div class="header">
<div class="back" onclick="goBack()">←</div>
<div class="timer">⏱ <span id="time">60</span>s | <span id="count"></span></div>
</div>

<div class="progress"><div class="bar" id="bar"></div></div>

<div class="card" id="quizBox"></div>

</div>

<div class="bottom">
📘 Daily Question for UPSC / BPSC
</div>

<script>
function goBack(){
window.location.href="https://shoruto.com";
}

const quiz=[
{
q:"The Food Price Index is released by which organization?",
options:["World Bank","IMF","World Economic Forum","FAO"],
answer:3
},
{
q:"Which Article of Indian Constitution deals with Right to Equality?",
options:["Article 14","Article 19","Article 21","Article 32"],
answer:0
}
];

let current=0,answers=[],timer,time=60;

/* LOAD */
function load(){
clearInterval(timer);
time=60;
startTimer();

let q=quiz[current];
count.innerText=(current+1)+" / "+quiz.length;
bar.style.width=((current+1)/quiz.length)*100+"%";

let html=`
<div class="current">
<div class="icon">📄</div>
<div>
<div style="color:#22c55e">Current Question</div>
<div>${current+1} / ${quiz.length}</div>
</div>
</div>

<div class="question">${q.q}</div>
`;

q.options.forEach((opt,i)=>{
html+=`<div class="option ${answers[current]==i?'selected':''}" onclick="select(${i})">
${String.fromCharCode(65+i)}. ${opt}
</div>`;
});

html+=`
<div class="tip">💡 Read carefully before selecting</div>

<div class="buttons">
<button class="btn prev" onclick="prev()">Previous</button>
<button class="btn next" onclick="next()">Next</button>
</div>
`;

quizBox.innerHTML=html;
}

/* TIMER */
function startTimer(){
timer=setInterval(()=>{
time--;
time<0?next():document.getElementById("time").innerText=time;
},1000);
}
/* SELECT */
function select(i){
answers[current]=i;
load();
}

/* NAV */
function next(){
clearInterval(timer);
if(current<quiz.length-1){current++;load();}
else result();
}
function prev(){
clearInterval(timer);
if(current>0){current--;load();}
}

/* RESULT */
function result(){
let score=0,html="<h2 style='text-align:center'>Result</h2>";

quiz.forEach((q,i)=>{
if(q.answer===answers[i]) score++;

html+=`
<div class="result-card">
<b>Q${i+1}</b> ${q.q}<br>
Your: <span class="${q.answer===answers[i]?'correct':'wrong'}">
${answers[i]!=undefined?q.options[answers[i]]:"Not Attempted"}
</span><br>
Correct: <span class="correct">${q.options[q.answer]}</span>
</div>`;
});

let deg=(score/quiz.length)*360;

html+=`
<div class="circle">
<div class="fill" id="fill"></div>
<div class="score">${score}/${quiz.length}</div>
</div>
`;

app.innerHTML=html;

setTimeout(()=>fill.style.transform="rotate("+deg+"deg)",100);
}

load();
</script>

</body>
</html>
