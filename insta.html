<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trending Hashtag Dashboard | Instagram Analytics</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            animation: float 20s infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0); opacity: 0; }
            10% { opacity: 0.5; }
            90% { opacity: 0.3; }
            100% { transform: translateY(-100px) translateX(50px); opacity: 0; }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header h1 {
            font-size: 48px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #a855f7, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .header p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 16px;
        }

        .last-updated {
            margin-top: 15px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.1);
        }

        .stat-icon {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .stat-value {
            font-size: 36px;
            font-weight: 700;
            color: white;
        }

        .stat-label {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            margin-top: 5px;
        }

        .hashtag-sections {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        .hashtag-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .hashtag-card h3 {
            color: white;
            font-size: 20px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .hashtag-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .hashtag-item {
            background: rgba(168, 85, 247, 0.2);
            padding: 8px 15px;
            border-radius: 25px;
            font-size: 13px;
            color: #c084fc;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .hashtag-item:hover {
            background: rgba(168, 85, 247, 0.4);
            transform: scale(1.05);
        }

        .hashtag-count {
            background: rgba(0, 0, 0, 0.3);
            padding: 2px 6px;
            border-radius: 20px;
            font-size: 10px;
            color: #fff;
        }

        .reels-section {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            margin-top: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .reels-section h3 {
            color: white;
            font-size: 24px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .reel-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .reel-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 15px;
            transition: all 0.2s;
        }

        .reel-item:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .reel-rank {
            font-size: 24px;
            font-weight: 700;
            color: #a855f7;
            min-width: 50px;
        }

        .reel-info {
            flex: 1;
        }

        .reel-likes {
            color: #f87171;
            font-weight: 600;
        }

        .reel-link {
            color: #a855f7;
            text-decoration: none;
            font-size: 12px;
        }

        .reel-link:hover {
            text-decoration: underline;
        }

        .age-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            margin-left: 10px;
        }

        .age-0-1 { background: #10b981; color: white; }
        .age-1-5 { background: #3b82f6; color: white; }
        .age-5-10 { background: #8b5cf6; color: white; }
        .age-10-20 { background: #f59e0b; color: white; }
        .age-20-30 { background: #ef4444; color: white; }

        .loader {
            text-align: center;
            padding: 50px;
            color: white;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: rgba(255, 255, 255, 0.5);
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #a855f7, #ec4899);
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 14px;
            z-index: 1000;
            animation: fadeInUp 0.3s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        @media (max-width: 768px) {
            .header h1 { font-size: 32px; }
            .hashtag-sections { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>
    
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-chart-line"></i> Trending Hashtag Dashboard</h1>
            <p>Real-time trending hashtags from Instagram's Explore page</p>
            <div class="last-updated" id="last-updated">Loading data...</div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon">📊</div>
                <div class="stat-value" id="total-posts">-</div>
                <div class="stat-label">Total Posts Analyzed</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🏷️</div>
                <div class="stat-value" id="total-hashtags">-</div>
                <div class="stat-label">Unique Hashtags</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🔥</div>
                <div class="stat-value" id="trending-count">-</div>
                <div class="stat-label">Trending Hashtags</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📅</div>
                <div class="stat-value" id="avg-age">-</div>
                <div class="stat-label">Avg Post Age (days)</div>
            </div>
        </div>

        <!-- Hashtag Sections by Age -->
        <div class="hashtag-sections" id="hashtag-sections">
            <div class="loader"><i class="fas fa-spinner fa-spin"></i> Loading hashtags...</div>
        </div>

        <!-- Top Reels Section -->
        <div class="reels-section" id="reels-section">
            <h3><i class="fas fa-trophy"></i> Top Trending Reels</h3>
            <div class="reel-list" id="reel-list">
                <div class="loader"><i class="fas fa-spinner fa-spin"></i> Loading reels...</div>
            </div>
        </div>
    </div>

    <script>
        // Data will be loaded from data.json
        let allPosts = [];

        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text);
            showToast(`Copied: ${text}`);
        }

        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                const size = Math.random() * 5 + 2;
                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                particle.style.left = `${Math.random() * 100}%`;
                particle.style.top = `${Math.random() * 100}%`;
                particle.style.animationDelay = `${Math.random() * 20}s`;
                particle.style.animationDuration = `${15 + Math.random() * 20}s`;
                particlesContainer.appendChild(particle);
            }
        }

        function groupHashtagsByAge(posts) {
            const ageGroups = {
                '0-1': { name: '🔥 Last 24 Hours', tags: {} },
                '1-5': { name: '📅 1-5 Days Old', tags: {} },
                '5-10': { name: '📆 5-10 Days Old', tags: {} },
                '10-20': { name: '🗓️ 10-20 Days Old', tags: {} },
                '20-30': { name: '📖 20-30 Days Old', tags: {} }
            };

            posts.forEach(post => {
                const category = post.post_age_category;
                if (category && ageGroups[category]) {
                    post.hashtags.forEach(tag => {
                        if (!ageGroups[category].tags[tag]) {
                            ageGroups[category].tags[tag] = 0;
                        }
                        ageGroups[category].tags[tag]++;
                    });
                }
            });

            // Sort each group by frequency
            for (let group in ageGroups) {
                const sorted = Object.entries(ageGroups[group].tags)
                    .sort((a, b) => b[1] - a[1])
                    .slice(0, 15);
                ageGroups[group].tags = sorted;
            }

            return ageGroups;
        }

        function getTopReels(posts) {
            // Sort by likes (highest first) and take top 10
            return [...posts]
                .sort((a, b) => b.likes - a.likes)
                .slice(0, 10);
        }

        function updateDashboard() {
            if (allPosts.length === 0) {
                document.getElementById('hashtag-sections').innerHTML = '<div class="empty-state"><i class="fas fa-inbox"></i><p>No data yet. Run the bot to collect hashtags!</p></div>';
                document.getElementById('reel-list').innerHTML = '<div class="empty-state"><i class="fas fa-inbox"></i><p>No reels data available</p></div>';
                return;
            }

            // Update stats
            const uniqueHashtags = new Set();
            allPosts.forEach(post => {
                post.hashtags.forEach(tag => uniqueHashtags.add(tag));
            });
            const totalLikes = allPosts.reduce((sum, post) => sum + post.likes, 0);
            const avgAge = Math.round(allPosts.reduce((sum, post) => sum + post.post_age_days, 0) / allPosts.length);

            document.getElementById('total-posts').textContent = allPosts.length;
            document.getElementById('total-hashtags').textContent = uniqueHashtags.size;
            document.getElementById('trending-count').textContent = Object.keys(uniqueHashtags).length;
            document.getElementById('avg-age').textContent = avgAge;

            // Group hashtags by age
            const ageGroups = groupHashtagsByAge(allPosts);
            
            // Render hashtag sections
            const sectionsContainer = document.getElementById('hashtag-sections');
            sectionsContainer.innerHTML = '';
            
            for (const [category, group] of Object.entries(ageGroups)) {
                if (group.tags.length > 0) {
                    const card = document.createElement('div');
                    card.className = 'hashtag-card';
                    card.innerHTML = `
                        <h3>${group.name}</h3>
                        <div class="hashtag-list">
                            ${group.tags.map(([tag, count]) => `
                                <div class="hashtag-item" onclick="copyToClipboard('${tag}')">
                                    ${tag} <span class="hashtag-count">${count}</span>
                                </div>
                            `).join('')}
                        </div>
                    `;
                    sectionsContainer.appendChild(card);
                }
            }

            if (sectionsContainer.children.length === 0) {
                sectionsContainer.innerHTML = '<div class="empty-state">No hashtags found in any age range</div>';
            }

            // Render top reels
            const topReels = getTopReels(allPosts);
            const reelList = document.getElementById('reel-list');
            reelList.innerHTML = '';
            
            topReels.forEach((reel, index) => {
                const medal = index === 0 ? '🥇' : index === 1 ? '🥈' : index === 2 ? '🥉' : `${index + 1}`;
                const ageClass = `age-${reel.post_age_category}`;
                reelList.innerHTML += `
                    <div class="reel-item">
                        <div class="reel-rank">${medal}</div>
                        <div class="reel-info">
                            <div><span class="reel-likes">❤️ ${reel.likes_display || reel.likes.toLocaleString()} likes</span>
                            <span class="age-badge ${ageClass}">${reel.post_age_days} days old</span></div>
                            <div class="hashtag-list" style="margin-top: 8px;">
                                ${reel.hashtags.slice(0, 5).map(tag => `
                                    <span class="hashtag-item" style="font-size: 11px; padding: 4px 10px;" onclick="copyToClipboard('${tag}')">${tag}</span>
                                `).join('')}
                            </div>
                        </div>
                        <a href="${reel.url}" target="_blank" class="reel-link">View →</a>
                    </div>
                `;
            });
        }

        async function loadData() {
            try {
                // Try to load from data.json (uploaded by your bot)
                const response = await fetch('data.json');
                if (response.ok) {
                    allPosts = await response.json();
                    document.getElementById('last-updated').innerHTML = `<i class="fas fa-clock"></i> Last updated: ${new Date().toLocaleString()}`;
                    updateDashboard();
                } else {
                    // Fallback to sample data if no data.json exists
                    document.getElementById('last-updated').innerHTML = `<i class="fas fa-clock"></i> Waiting for data... Run your bot and upload data.json`;
                    document.getElementById('hashtag-sections').innerHTML = '<div class="empty-state"><i class="fas fa-cloud-upload-alt"></i><p>Upload data.json to see trending hashtags!<br><br>Run your Instagram bot and copy explore_hashtags.json to data.json</p></div>';
                    document.getElementById('reel-list').innerHTML = '<div class="empty-state"><i class="fas fa-cloud-upload-alt"></i><p>No data available</p></div>';
                }
            } catch (error) {
                console.error('Error loading data:', error);
                document.getElementById('hashtag-sections').innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><p>Error loading data. Make sure data.json exists.</p></div>';
            }
        }

        // Initialize
        createParticles();
        loadData();
        
        // Auto-refresh every 30 seconds
        setInterval(loadData, 30000);
    </script>
</body>
</html>
