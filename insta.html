<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trending Hashtag Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            padding: 30px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            margin-bottom: 30px;
        }
        .header h1 {
            color: white;
            font-size: 40px;
            margin-bottom: 10px;
        }
        .header p {
            color: rgba(255,255,255,0.7);
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
        }
        .stat-value {
            font-size: 36px;
            font-weight: bold;
            color: white;
        }
        .stat-label {
            color: rgba(255,255,255,0.7);
            margin-top: 5px;
        }
        .section {
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .section h2 {
            color: white;
            margin-bottom: 15px;
        }
        .hashtag-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .hashtag {
            background: rgba(168,85,247,0.3);
            padding: 8px 15px;
            border-radius: 20px;
            color: #c084fc;
            cursor: pointer;
            font-size: 14px;
        }
        .hashtag:hover {
            background: rgba(168,85,247,0.6);
        }
        .reel-item {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .reel-likes {
            color: #f87171;
            font-weight: bold;
        }
        .reel-link {
            color: #a855f7;
            text-decoration: none;
        }
        .error {
            text-align: center;
            padding: 40px;
            color: rgba(255,255,255,0.7);
        }
        .last-updated {
            text-align: center;
            color: rgba(255,255,255,0.5);
            margin-top: 20px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔥 Trending Hashtag Dashboard</h1>
            <p>Real-time trending hashtags from Instagram's Explore page</p>
        </div>

        <div class="stats" id="stats">
            <div class="stat-card">
                <div class="stat-value" id="total-posts">-</div>
                <div class="stat-label">Total Posts</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="total-hashtags">-</div>
                <div class="stat-label">Unique Hashtags</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="rising-count">-</div>
                <div class="stat-label">Rising Hashtags</div>
            </div>
        </div>

        <div class="section" id="hashtags-section">
            <h2>🏷️ Hashtags by Like Range</h2>
            <div id="hashtags-content">Loading...</div>
        </div>

        <div class="section">
            <h2>🏆 Top Trending Reels</h2>
            <div id="reels-content">Loading...</div>
        </div>

        <div class="last-updated" id="last-updated"></div>
    </div>

    <script>
        // Load data from data.json
        async function loadData() {
            try {
                const response = await fetch('data.json');
                if (!response.ok) {
                    throw new Error('data.json not found');
                }
                const data = await response.json();
                displayData(data);
            } catch (error) {
                document.getElementById('hashtags-content').innerHTML = '<div class="error">⚠️ Error loading data. Make sure data.json exists in the same folder.</div>';
                document.getElementById('reels-content').innerHTML = '';
                console.error('Error:', error);
            }
        }

        function displayData(data) {
            // Update stats
            const allHashtags = new Set();
            data.posts.forEach(post => {
                post.hashtags.forEach(tag => allHashtags.add(tag));
            });
            
            document.getElementById('total-posts').textContent = data.total_posts;
            document.getElementById('total-hashtags').textContent = allHashtags.size;
            document.getElementById('rising-count').textContent = data.rising_hashtags?.length || 0;
            document.getElementById('last-updated').textContent = `📅 Last updated: ${new Date(data.last_updated).toLocaleString()}`;

            // Group hashtags by like range
            const postsByRange = {};
            data.posts.forEach(post => {
                const range = post.like_range || 'Unknown';
                if (!postsByRange[range]) postsByRange[range] = [];
                postsByRange[range].push(post);
            });

            // Display hashtags by range
            let hashtagsHtml = '';
            for (const [range, posts] of Object.entries(postsByRange)) {
                // Count hashtag frequency
                const hashtagCount = {};
                posts.forEach(post => {
                    post.hashtags.forEach(tag => {
                        hashtagCount[tag] = (hashtagCount[tag] || 0) + 1;
                    });
                });
                
                const topHashtags = Object.entries(hashtagCount)
                    .sort((a, b) => b[1] - a[1])
                    .slice(0, 15);
                
                if (topHashtags.length > 0) {
                    hashtagsHtml += `<h3 style="color: white; margin-top: 20px;">${range}</h3>`;
                    hashtagsHtml += `<div class="hashtag-list">`;
                    topHashtags.forEach(([tag, count]) => {
                        hashtagsHtml += `<span class="hashtag" onclick="copyToClipboard('${tag}')">${tag} (${count})</span>`;
                    });
                    hashtagsHtml += `</div>`;
                }
            }
            document.getElementById('hashtags-content').innerHTML = hashtagsHtml || '<div class="error">No hashtags found</div>';

            // Display top reels
            const topReels = [...data.posts].sort((a, b) => b.likes - a.likes).slice(0, 10);
            let reelsHtml = '';
            topReels.forEach((reel, index) => {
                const medal = index === 0 ? '🥇' : index === 1 ? '🥈' : index === 2 ? '🥉' : `${index + 1}`;
                reelsHtml += `
                    <div class="reel-item">
                        <div style="display: flex; align-items: center; gap: 15px;">
                            <span style="font-size: 24px;">${medal}</span>
                            <div>
                                <div class="reel-likes">❤️ ${reel.likes_display} likes</div>
                                <div class="hashtag-list" style="margin-top: 8px;">
                                    ${reel.hashtags.slice(0, 5).map(tag => `<span class="hashtag" style="font-size: 11px; padding: 4px 10px;" onclick="copyToClipboard('${tag}')">${tag}</span>`).join('')}
                                </div>
                            </div>
                        </div>
                        <a href="${reel.url}" target="_blank" class="reel-link">View →</a>
                    </div>
                `;
            });
            document.getElementById('reels-content').innerHTML = reelsHtml || '<div class="error">No reels found</div>';
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text);
            const toast = document.createElement('div');
            toast.textContent = `Copied: ${text}`;
            toast.style.position = 'fixed';
            toast.style.bottom = '20px';
            toast.style.left = '50%';
            toast.style.transform = 'translateX(-50%)';
            toast.style.background = '#a855f7';
            toast.style.color = 'white';
            toast.style.padding = '10px 20px';
            toast.style.borderRadius = '20px';
            toast.style.zIndex = '1000';
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        loadData();
        setInterval(loadData, 60000); // Refresh every minute
    </script>
</body>
</html>
