<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Trending Reels Dashboard</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Inter, Arial, sans-serif;
    background:#f5f7fb;
}

.header{
    background:linear-gradient(135deg,#833AB4,#FD1D1D,#FCAF45);
    color:white;
    padding:24px;
    text-align:center;
    box-shadow:0 2px 10px rgba(0,0,0,.15);
}

.header h1{
    font-size:32px;
}

.header p{
    margin-top:8px;
    opacity:.9;
}

.container{
    max-width:1400px;
    margin:30px auto;
    padding:20px;
}

.reels-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(400px,1fr));
    gap:24px;
}

.reel-card{
    background:white;
    border-radius:16px;
    padding:16px;
    box-shadow:0 4px 20px rgba(0,0,0,.08);
    transition:.3s;
}

.reel-card:hover{
    transform:translateY(-4px);
}

.card-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:12px;
}

.badge{
    background:#eef2ff;
    color:#4338ca;
    padding:6px 12px;
    border-radius:20px;
    font-size:12px;
    font-weight:600;
}

.likes{
    color:#e11d48;
    font-weight:700;
}

.instagram-media{
    margin:0 auto !important;
}
</style>
</head>

<body>

<div class="header">
    <h1>🔥 Trending Instagram Reels</h1>
    <p>Most Popular Reels Dashboard</p>
</div>

<div class="container">

    <div class="reels-grid">

        <!-- Reel 1 -->
        <div class="reel-card">

            <div class="card-header">
                <div class="badge">Reel #1</div>
                <div class="likes">❤️ 110.2K</div>
            </div>

            <blockquote
                class="instagram-media"
                data-instgrm-permalink="https://www.instagram.com/reel/DWb-iOOSJQ3/"
                data-instgrm-version="14">
            </blockquote>

        </div>

        <!-- Reel 2 -->
        <div class="reel-card">

            <div class="card-header">
                <div class="badge">Reel #2</div>
                <div class="likes">❤️ 78.4K</div>
            </div>

            <blockquote
                class="instagram-media"
                data-instgrm-permalink="https://www.instagram.com/reel/DWRb4bQCcVQ/"
                data-instgrm-version="14">
            </blockquote>

        </div>

    </div>

</div>

<script async src="https://www.instagram.com/embed.js"></script>

<script>
window.addEventListener("load", () => {
    if (window.instgrm) {
        window.instgrm.Embeds.process();
    }
});
</script>

</body>
</html>
