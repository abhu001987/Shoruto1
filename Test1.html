<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Trending Instagram Reels</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter,Arial,sans-serif;
}

body{
    background:#f4f6f9;
}

/* HEADER */
.header{
    background:linear-gradient(135deg,#833AB4,#FD1D1D,#FCAF45);
    color:white;
    text-align:center;
    padding:28px;
}

.header h1{
    font-size:40px;
    margin-bottom:8px;
}

.header p{
    font-size:18px;
    opacity:.9;
}

/* CONTAINER */
.container{
    max-width:1500px;
    margin:auto;
    padding:30px;
}

/* GRID */
.reels-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(340px,1fr));
    gap:24px;
}

/* CARD */
.reel-card{
    background:white;
    border-radius:18px;
    padding:16px;
    box-shadow:0 8px 25px rgba(0,0,0,.08);
    transition:.3s;
}

.reel-card:hover{
    transform:translateY(-4px);
}

.card-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:10px;
}

.badge{
    background:#eef2ff;
    color:#4338ca;
    padding:8px 14px;
    border-radius:999px;
    font-size:13px;
    font-weight:600;
}

.likes{
    color:#e11d48;
    font-size:28px;
    font-weight:700;
}

/* SMALLER EMBEDS */
.instagram-wrapper{
    display:flex;
    justify-content:center;
    overflow:hidden;
    height:520px; /* controls visible area */
}

.instagram-media{
    transform:scale(0.68);
    transform-origin:top center;
    margin:0 auto !important;
}

/* MOBILE */
@media(max-width:768px){

    .header h1{
        font-size:28px;
    }

    .instagram-wrapper{
        height:500px;
    }

    .instagram-media{
        transform:scale(0.72);
    }
}
</style>
</head>

<body>

<div class="header">
    <h1>🔥 Trending Instagram Reels</h1>
    <p>Most Popular Reels Dashboard</p>
</div>

<div class="container">

    <div class="reels-grid">

        <!-- Reel 1 -->
        <div class="reel-card">

            <div class="card-header">
                <div class="badge">Reel #1</div>
                <div class="likes">❤️ 110.2K</div>
            </div>

            <div class="instagram-wrapper">
                <blockquote
                    class="instagram-media"
                    data-instgrm-permalink="https://www.instagram.com/reel/DZINUqkOx0m/"
                    data-instgrm-version="14">
                </blockquote>
            </div>

        </div>

        <!-- Reel 2 -->
        <div class="reel-card">

            <div class="card-header">
                <div class="badge">Reel #2</div>
                <div class="likes">❤️ 78.4K</div>
            </div>

            <div class="instagram-wrapper">
                <blockquote
                    class="instagram-media"
                    data-instgrm-permalink="https://www.instagram.com/reel/DZP6l7hOYCu/"
                    data-instgrm-version="14">
                </blockquote>
            </div>

        </div>

        <!-- Reel 3 -->
        <div class="reel-card">

            <div class="card-header">
                <div class="badge">Reel #3</div>
                <div class="likes">❤️ 89K</div>
            </div>

            <div class="instagram-wrapper">
                <blockquote
                    class="instagram-media"
                    data-instgrm-permalink="https://www.instagram.com/reel/DWb-iOOSJQ3/"
                    data-instgrm-version="14">
                </blockquote>
            </div>

        </div>

        <!-- Reel 4 -->
        <div class="reel-card">

            <div class="card-header">
                <div class="badge">Reel #4</div>
                <div class="likes">❤️ 676K</div>
            </div>

            <div class="instagram-wrapper">
                <blockquote
                    class="instagram-media"
                    data-instgrm-permalink="https://www.instagram.com/reel/DWRb4bQCcVQ/"
                    data-instgrm-version="14">
                </blockquote>
            </div>

        </div>

    </div>

</div>

<script async src="https://www.instagram.com/embed.js"></script>

<script>
window.addEventListener("load", () => {
    if (window.instgrm) {
        window.instgrm.Embeds.process();
    }
});
</script>

</body>
</html>
