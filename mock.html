<!DOCTYPE html>
<html>
<head>
<title>Mock</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Arial;
background:#F5F7FA;
color:#0F172A;
}

/* APP */
.app{
max-width:480px;
margin:auto;
padding:12px;
display:flex;
flex-direction:column;
gap:12px;
}

/* TOP BAR */
.top-bar{
display:flex;
justify-content:space-between;
align-items:center;
background:#fff;
padding:12px;
border-radius:14px;
border:1px solid #E2E8F0;
}

.back-btn{
background:none;
border:none;
font-size:16px;
font-weight:600;
color:#0F172A;
}

.timer{
color:#F97316;
font-weight:bold;
}

/* PROGRESS */
.progress-wrap{
display:flex;
align-items:center;
gap:10px;
}

.progress-bar{
flex:1;
height:6px;
background:#E2E8F0;
border-radius:10px;
}

.progress-fill{
height:100%;
width:30%;
background:#22C55E;
border-radius:10px;
}

.progress-text{
font-size:13px;
color:#64748B;
}

/* QUESTION BOX */
.question-box{
background:#fff;
padding:14px;
border-radius:14px;
border:1px solid #E2E8F0;
}

.question{
font-weight:600;
font-size:16px;
}

/* HINT */
.hint{
font-size:13px;
color:#64748B;
margin-top:6px;
}

/* DIVIDER */
.divider{
height:1px;
background:#E2E8F0;
margin-top:10px;
}

/* TEXTAREA */
textarea{
width:100%;
height:calc(100vh - 320px);
max-height:400px;
border-radius:16px;
border:1px solid #E2E8F0;
padding:14px;
resize:none;
background:#F8FAFC;
color:#0F172A;
}

textarea::placeholder{
color:#64748B;
}
/* BUTTONS */
.buttons{
display:flex;
gap:10px;
}

.speak{
background:#D1FAE5;
color:#065F46;
padding:14px;
border:none;
border-radius:16px;
font-weight:600;
}

.submit{
background:#FED7AA;
color:#9A3412;
padding:14px;
border:none;
border-radius:16px;
font-weight:600;
}

/* TIPS */
.tips-box{
background:#ECFDF5;
padding:12px;
border-radius:12px;
font-size:13px;
color:#065F46;
}

/* BOTTOM ICONS */
.bottom-icons{
position:fixed;
bottom:0;
width:100%;
display:flex;
justify-content:space-around;
background:#fff;
padding:10px 0;
border-top:1px solid #E2E8F0;
}

.bottom-icons div{
text-align:center;
font-size:14px;
color:#64748B;
}

.bottom-icons span{
font-size:12px;
}

/* POPUP */
.popup{
position:fixed;
inset:0;
background:rgba(0,0,0,0.7);
display:flex;
justify-content:center;
align-items:center;
}

.popup-box{
background:#fff;
color:#0F172A;
padding:20px;
border-radius:16px;
text-align:center;
width:90%;
max-width:300px;
}

/* RESULT */
.result{padding:15px;}

.circle{
width:140px;
height:140px;
border-radius:50%;
border:8px solid #E2E8F0;
display:flex;
align-items:center;
justify-content:center;
font-size:26px;
margin:auto;
}

.grid{
display:flex;
gap:10px;
margin-top:15px;
}

.box{
flex:1;
background:#fff;
padding:10px;
border-radius:12px;
border:1px solid #E2E8F0;
text-align:center;
}

.q-card{
background:#fff;
padding:12px;
margin-top:10px;
border-radius:12px;
border:1px solid #E2E8F0;
}

</style>
</head>

<body>

<div class="popup" id="popup">
<div class="popup-box">
<h3>Instructions</h3>
<p>90 sec per question</p>
<p>Use Chrome for voice</p>
<button onclick="startInterview()">Start</button>
</div>
</div>

<div class="app">

<div class="top-bar">
<button class="back-btn" onclick="goBack()">← Back</button>
<div class="timer" id="timer">⏱️ 90</div>
</div>

<!-- PROGRESS -->
<div class="progress-wrap">
<div class="progress-bar">
<div class="progress-fill"></div>
</div>
<div class="progress-text">1 / 10</div>
</div>

<!-- QUESTION -->
<div class="question-box">
<div class="question" id="question">Loading...</div>
<div class="hint">💡 You can speak or type your answer</div>
<div class="divider"></div>
</div>

<textarea id="answer" placeholder="Speak or type..."></textarea>

<!-- TIPS -->
<div class="tips-box">
✨ <b>Tips</b><br>
Take a moment to organize your thoughts before speaking or typing.
</div>

<div class="buttons">
<button class="speak" onclick="toggleListening()" id="micBtn">🎤 Start</button>
<button class="submit" onclick="submitAnswer()">Submit</button>
</div>

</div>

<!-- BOTTOM ICONS -->
<div class="bottom-icons">
<div>🧠<br><span>Assess</span></div>
<div>✍️<br><span>Express</span></div>
<div>🛡️<br><span>Evaluation</span></div>
</div>

<script>
/* YOUR ORIGINAL JS — UNTOUCHED */

let questions=[];
let current=0;
let count=1;
let totalScore=0;
let maxScore=0;
let answersLog=[];
let timer,timeLeft=90;
let recognition;
let isListening=false;
let finalTranscript="";

fetch("questions.json")
.then(r=>r.json())
.then(d=>questions=d);

function startInterview(){
popup.style.display="none";
loadQuestion(0);
}

function goBack(){
window.location.href="/";
}

function startTimer(){
clearInterval(timer);
timeLeft=90;

timer=setInterval(()=>{
document.getElementById("timer").innerText="⏱️ "+timeLeft;
timeLeft--;
if(timeLeft<0) submitAnswer();
},1000);
}

function loadQuestion(i){
finalTranscript="";
answer.value="";
question.innerText=questions[i].q;
startTimer();
}

function toggleListening(){
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;

if(!SR){
alert("Use Chrome");
return;
}

if(!isListening){

recognition=new SR();
recognition.interimResults=true;

recognition.onresult=function(e){
let interim="";

for(let i=e.resultIndex;i<e.results.length;i++){
let t=e.results[i][0].transcript.trim();

if(e.results[i].isFinal){
if(!finalTranscript.endsWith(t)){
finalTranscript+=t+" ";
}
}else{
interim+=t;
}
}
answer.value=finalTranscript+interim;
};

recognition.onend=function(){
if(isListening) recognition.start();
};

recognition.start();
isListening=true;
micBtn.innerText="🔴 Listening";

}else{
isListening=false;
recognition.stop();
micBtn.innerText="🎤 Start";
}
}

function cleanText(text){
return text.toLowerCase().replace(/[^a-z0-9\s]/g,"").replace(/\s+/g," ").trim();
}

function evaluate(ans,keywords){
let cleanAns=cleanText(ans).replace(/\s/g,"");
let matched=[];

keywords.forEach(k=>{
let cleanKey=cleanText(k).replace(/\s/g,"");
if(cleanAns.includes(cleanKey)){
matched.push(k);
}
});

return{
score:matched.length,
missing:keywords.filter(k=>!matched.includes(k))
};
}

function submitAnswer(){
clearInterval(timer);

if(recognition){
recognition.stop();
isListening=false;
}

let ans=answer.value;
let q=questions[current];
let res=evaluate(ans,q.keywords);

totalScore+=res.score;
maxScore+=q.keywords.length;

answersLog.push({
q:q.q,
ans:ans,
model:q.model,
score:res.score,
total:q.keywords.length,
missing:res.missing
});

count++;

if(count>10){
showResult();
return;
}

current=Math.floor(Math.random()*questions.length);
loadQuestion(current);
}

function showResult(){
let percent=Math.round((totalScore/maxScore)*100);

let html=`<div class="result">
<div class="circle">${percent}%</div>

<div class="grid">
<div class="box">${totalScore}<br>Points</div>
<div class="box">${percent}%<br>Accuracy</div>
</div>

<h3>Analysis</h3>
`;

answersLog.forEach(a=>{
html+=`
<div class="q-card">
<b>Q:</b> ${a.q}<br><br>
<b>Your Answer:</b><br>${a.ans || "No answer"}<br><br>
<b>Ideal Answer:</b><br>${a.model || "N/A"}
</div>`;
});

html+="</div>";
document.body.innerHTML=html;
}

</script>

</body>
</html>
