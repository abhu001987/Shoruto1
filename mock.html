<!DOCTYPE html>
<html>
<head>
<title>Shoruto – UPSC Mock Tests & Answer Writing Practice</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="description" content="Practice UPSC mock tests and improve answer writing with Shoruto. Simulate real exam conditions, track performance, and boost your preparation.">

<link rel="canonical" href="https://www.shoruto.com/mock">

<link rel="icon" href="/icon-192.png" type="image/png">
<link rel="apple-touch-icon" href="/icon-192.png">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  
<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(120deg,#0f2027,#203a43,#2c5364);
color:#f1f5f9;
}

/* APP */
.app{
max-width:480px;
margin:auto;
padding:12px;
display:flex;
flex-direction:column;
gap:12px;
}

/* TOP BAR */
.top-bar{
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(255,255,255,0.05);
padding:12px;
border-radius:14px;
border:1px solid rgba(255,255,255,0.08);
}

.back-btn{
background:none;
border:none;
font-size:16px;
font-weight:600;
color:#f1f5f9;
}

.timer{
color:#ff7a00;
font-weight:bold;
}

/* PROGRESS */
.progress-wrap{
display:flex;
align-items:center;
gap:10px;
}

.progress-bar{
flex:1;
height:6px;
background:#0b1f22;
border-radius:10px;
}

.progress-fill{
height:100%;
width:30%;
background:#22c55e;
border-radius:10px;
}

.progress-text{
font-size:13px;
color:#9fb7b9;
}

/* QUESTION BOX */
.question-box{
background:rgba(255,255,255,0.05);
padding:14px;
border-radius:14px;
border:1px solid rgba(255,255,255,0.08);
}

.question{
font-weight:600;
font-size:16px;
}

/* HINT */
.hint{
font-size:13px;
color:#9fb7b9;
margin-top:6px;
}

/* DIVIDER */
.divider{
height:1px;
background:rgba(255,255,255,0.08);
margin-top:10px;
}

textarea{
width:100%;
height:180px;
max-height:220px;
border-radius:16px;
border:1px solid rgba(255,255,255,0.08);
padding:14px;
resize:none;
box-sizing:border-box;
background:#0b1f22;
color:#f1f5f9;
font-size:14px;
}
/* BUTTONS */
.buttons{
display:flex;
justify-content:space-between;
width:100%;
margin-top:12px;
}

.buttons button{
width:48%;
}

/* START BUTTON */
.speak{
background:rgba(34,197,94,0.2);
color:#22c55e;
padding:14px;
border:none;
border-radius:16px;
font-weight:600;
}

/* SUBMIT BUTTON */
.submit{
background:linear-gradient(135deg,#ff7a00,#ff9a3c);
color:white;
padding:14px;
border:none;
border-radius:16px;
font-weight:600;
}

/* TIPS */
.tips-box{
background:rgba(34,197,94,0.1);
padding:12px;
border-radius:12px;
font-size:13px;
color:#22c55e;
}

/* BOTTOM ICONS */
.bottom-icons{
position:fixed;
bottom:0;
width:100%;
display:flex;
justify-content:space-around;
background:#0b1f22;
padding:10px 0;
border-top:1px solid rgba(255,255,255,0.08);
}

.bottom-icons div{
text-align:center;
font-size:14px;
color:#9fb7b9;
}

.bottom-icons span{
font-size:12px;
}

/* POPUP */
.popup{
position: fixed;
inset: 0;
background: rgba(0,0,0,0.6);
backdrop-filter: blur(6px);
display: flex;
justify-content: center;
align-items: center;
z-index: 999;
}

.popup-box{
background:#203a43;
color:#f1f5f9;
padding: 20px;
border-radius: 18px;
width: 85%;
max-width: 320px;
text-align: center;
box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

.popup-box h3{
margin-bottom: 15px;
}

.inst-item{
font-size: 14px;
margin: 8px 0;
color: #cbd5f5;
}

.inst-item.warn{
color: #ff4d4d;
font-weight: 500;
}

.start-btn{
margin-top: 15px;
width: 100%;
padding: 12px;
border: none;
border-radius: 12px;
background: linear-gradient(135deg, #22C55E, #16A34A);
color: white;
font-weight: 600;
cursor: pointer;
}
/* ========================= */
/* 🔥 RESULT UI (UPGRADED) */
/* ========================= */

.result-header{
background:rgba(255,255,255,0.06);
border:1px solid rgba(255,255,255,0.1);
padding:12px;
border-radius:14px;
text-align:center;
font-weight:600;
margin-bottom:10px;
backdrop-filter:blur(10px);
}

/* CIRCLE */
.circle-wrap{
position:relative;
width:170px;
height:170px;
margin:15px auto;
}

.circle-progress{
stroke:url(#grad);
stroke-width:12;
fill:none;
stroke-linecap:round;
stroke-dasharray:440;
stroke-dashoffset:440;
filter:drop-shadow(0 0 12px rgba(255,120,0,0.6));
transition:1.2s ease;
}

.score-text{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:28px;
font-weight:bold;
}

/* STATUS */
.status{
text-align:center;
font-size:18px;
font-weight:700;
margin-top:10px;
}

.subtext{
text-align:center;
font-size:13px;
color:#9fb7b9;
}

/* CARDS */
.grid{
display:flex;
gap:10px;
margin-top:15px;
}

.box{
flex:1;
padding:14px;
border-radius:16px;
background:rgba(255,255,255,0.06);
border:1px solid rgba(255,255,255,0.1);
backdrop-filter:blur(10px);
text-align:center;
}

/* ANALYSIS */
.q-card{
background:rgba(255,255,255,0.05);
padding:14px;
margin-top:12px;
border-radius:14px;
border:1px solid rgba(255,255,255,0.08);
}

.inner-box{
margin-top:8px;
padding:10px;
border-radius:12px;
background:rgba(0,0,0,0.25);
}

.correct{color:#22c55e;}
.wrong{color:#ff4d4d;}

/* BUTTONS */
.result-buttons{
display:flex;
gap:10px;
margin-top:15px;
}

.result-buttons button{
flex:1;
padding:12px;
border-radius:12px;
border:none;
font-weight:600;
}

.retry{background:#203a43;color:white;}
.home{
background:linear-gradient(135deg,#ff7a00,#ff9a3c);
color:white;
}
</style>
</head>

<body>


<!-- ORIGINAL BODY CONTENT (UNCHANGED) -->
<div class="popup" id="popup">
<div class="popup-box">
<h3>📋 Instructions</h3>
<div class="inst-item">⏱️ 90 sec per question</div>
<div class="inst-item">🎤 Use Chrome for voice</div>
<div class="inst-item warn">⚠️ Evaluation may not be 100% accurate</div>
<button class="start-btn" onclick="startInterview()">Start</button>
</div>
</div>

<div class="app">

<div class="top-bar">
<button class="back-btn" onclick="goBack()">Back</button>
<div class="timer" id="timer">⏱️ 90</div>
</div>

<div class="progress-wrap">
<div class="progress-bar">
<div class="progress-fill"></div>
</div>
<div class="progress-text">1 / 10</div>
</div>

<div class="question-box">
<div class="question" id="question">Loading...</div>
<div class="hint">💡 You can speak or type your answer</div>
<div class="divider"></div>
</div>

<textarea id="answer" placeholder="Speak or type..."></textarea>

<div class="tips-box">
✨ <b>Tips</b><br>
Take a moment to organize your thoughts before speaking or typing.
</div>

<div class="buttons">
<button class="speak" onclick="toggleListening()" id="micBtn">🎤 Start</button>
<button class="submit" onclick="submitAnswer()">Submit</button>
</div>

</div>

<div class="bottom-icons">
<div>🧠<br><span>Assess</span></div>
<div>✍️<br><span>Express</span></div>
<div>🛡️<br><span>Evaluation</span></div>
</div>

<script>

/* ===== YOUR ORIGINAL JS (UNCHANGED EXCEPT RESULT FUNCTION) ===== */

let questions=[];
let current=0;
let count=1;
let totalScore=0;
let maxScore=0;
let answersLog=[];
let timer,timeLeft=90;
let recognition;
let isListening=false;
let finalTranscript="";

fetch("questions.json")
.then(r=>r.json())
.then(d=>questions=d);

function startInterview(){
popup.style.display="none";
loadQuestion(0);
}
function goBack(){
window.location.href="/";
}

function startTimer(){
clearInterval(timer);
timeLeft=90;

timer=setInterval(()=>{
document.getElementById("timer").innerText="⏱️ "+timeLeft;
timeLeft--;
if(timeLeft<0) submitAnswer();
},1000);
}

function loadQuestion(i){
finalTranscript="";
answer.value="";
question.innerText=questions[i].q;
startTimer();
}

function toggleListening(){
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;

if(!SR){
alert("Use Chrome");
return;
}

if(!isListening){

recognition=new SR();
recognition.interimResults=true;

recognition.onresult=function(e){
let interim="";

for(let i=e.resultIndex;i<e.results.length;i++){
let t=e.results[i][0].transcript.trim();

if(e.results[i].isFinal){
if(!finalTranscript.endsWith(t)){
finalTranscript+=t+" ";
}
}else{
interim+=t;
}
}
answer.value=finalTranscript+interim;
};

recognition.onend=function(){
if(isListening) recognition.start();
};

recognition.start();
isListening=true;
micBtn.innerText="🔴 Stop";

}else{
isListening=false;
recognition.stop();
micBtn.innerText="🎤 Start";
}
}
function cleanText(text){
return text.toLowerCase().replace(/[^a-z0-9\s]/g,"").replace(/\s+/g," ").trim();
}

function evaluate(ans,keywords){
let cleanAns=cleanText(ans).replace(/\s/g,"");
let matched=[];

keywords.forEach(k=>{
let cleanKey=cleanText(k).replace(/\s/g,"");
if(cleanAns.includes(cleanKey)){
matched.push(k);
}
});

return{
score:matched.length,
missing:keywords.filter(k=>!matched.includes(k))
};
}

function submitAnswer(){
clearInterval(timer);

if(recognition){
recognition.stop();
isListening=false;
}

let ans=answer.value;
let q=questions[current];
let res=evaluate(ans,q.keywords);

totalScore+=res.score;
maxScore+=q.keywords.length;

answersLog.push({
q:q.q,
ans:ans,
model:q.model,
score:res.score,
total:q.keywords.length,
missing:res.missing
});

count++;

if(count>10){
showResult();
return;
}

current=Math.floor(Math.random()*questions.length);
loadQuestion(current);
}

/* 🔥 RESULT FUNCTION UPGRADED ONLY */
function showResult(){

let percent=Math.round((totalScore/maxScore)*100);

let status="Needs Improvement 😞";
let color="#ff4d4d";

if(percent>=70){
status="Excellent Work 🔥";
color="#22c55e";
}else if(percent>=40){
status="Good Try 👍";
color="#facc15";
}

let attempted = answersLog.filter(a => a.ans && a.ans.trim() !== "").length;
let skipped = answersLog.filter(a => !a.ans || a.ans.trim() === "").length;

let html=`<div class="result">

<div class="result-header">📊 Result Dashboard</div>

<div class="circle-wrap">
<svg width="170" height="170">
<defs>
<linearGradient id="grad">
<stop offset="0%" stop-color="#ff7a00"/>
<stop offset="100%" stop-color="#ff3c3c"/>
</linearGradient>
</defs>

<circle cx="85" cy="85" r="70" stroke="rgba(255,255,255,0.1)" stroke-width="12" fill="none"/>
<circle id="progressCircle" cx="85" cy="85" r="70" class="circle-progress"/>
</svg>

<div class="score-text">${percent}%</div>
</div>

<div class="status" style="color:${color}">${status}</div>
<div class="subtext">Keep improving daily 🚀</div>

<div class="grid">
<div class="box">⭐<br>${totalScore}<br>Points</div>
<div class="box">🎯<br>${percent}%<br>Accuracy</div>
</div>

<div class="grid">
<div class="box">📄<br>${attempted}<br>Attempted</div>
<div class="box">⏭<br>${skipped}<br>Skipped</div>
</div>

<h3 style="margin-top:15px;">Analysis</h3>
`;

answersLog.forEach(a=>{
html+=`
<div class="q-card">
<b>Q:</b> ${a.q}

<div class="inner-box wrong">
<b>Your Answer:</b><br>
${a.ans || "No answer"}
</div>

<div class="inner-box correct">
<b>Correct Answer:</b><br>
${a.model || "N/A"}
</div>

</div>`;
});

html+=`
<div class="result-buttons">
<button class="retry" onclick="location.reload()">Retry</button>
<button class="home" onclick="goBack()">Home</button>
</div>

</div>`;

document.body.innerHTML=html;

/* ANIMATION */
setTimeout(()=>{
let circle=document.getElementById("progressCircle");
let offset=440-(440*percent/100);
circle.style.strokeDashoffset=offset;
},100);

}

</script>

</body>
</html>
